<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060b18"/>
    </linearGradient>
    <linearGradient id="barGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="barCyan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glowGold" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#fbbf24" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" rx="72" fill="url(#bgGrad)"/>
  <rect width="800" height="800" rx="72" fill="url(#glowGold)"/>

  <!-- Subtle grid lines -->
  <line x1="180" y1="530" x2="620" y2="530" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
  <line x1="180" y1="460" x2="620" y2="460" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="180" y1="390" x2="620" y2="390" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="180" y1="320" x2="620" y2="320" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Chart bars -->
  <rect x="200" y="430" width="82" height="100" rx="10" fill="url(#barGold)" opacity="0.55" filter="url(#shadow)"/>
  <rect x="303" y="355" width="82" height="175" rx="10" fill="url(#barGold)" opacity="0.72"/>
  <rect x="406" y="270" width="82" height="260" rx="10" fill="url(#barGold)"/>
  <rect x="509" y="188" width="82" height="342" rx="10" fill="url(#barCyan)" filter="url(#shadow)"/>

  <!-- Trend line -->
  <polyline
    points="241,425 344,350 447,265 550,183"
    stroke="#fbbf24" stroke-width="5" fill="none"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- Trend arrow head -->
  <polygon points="550,165 572,195 528,195" fill="#fbbf24" opacity="0.45"/>

  <!-- Divider line -->
  <line x1="100" y1="574" x2="700" y2="574" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <!-- Product name -->
  <text x="400" y="628"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="52"
    letter-spacing="-1.5"
    fill="#f1f5f9">Portfolio Rebalancer</text>

  <!-- PRO badge -->
  <rect x="322" y="646" width="156" height="44" rx="22" fill="#fbbf24"/>
  <text x="400" y="675"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="22"
    letter-spacing="3"
    fill="#0a1628">PRO</text>

  <!-- Tagline -->
  <text x="400" y="736"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="500"
    font-size="22"
    letter-spacing="0.5"
    fill="#64748b">For Canadian TFSA &amp; RRSP Investors</text>
</svg>
