name: Refresh Stock Scanner Data

on:
  schedule:
    - cron: '0 13 * * *'   # 6:00 AM Vancouver PDT (UTC-7) / 5:00 AM PST (UTC-8) in winter
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch fundamentals (~95 tickers, ~35 s)
        run: node scripts/refresh-scanner.mjs

      - name: Commit and push updated data
        run: |
          git add src/data/stockUniverse.json
          if git diff --staged --quiet; then
            echo "No changes — data unchanged."
            exit 0
          fi

          # Sync HEAD to wherever remote main is RIGHT NOW (handles any commits
          # that landed while the ~35 s scan was running) then commit our fresh
          # data on top — guarantees the push is always a clean fast-forward.
          git fetch origin main
          git reset --soft origin/main
          git add src/data/stockUniverse.json
          git commit -m "chore: refresh scanner fundamentals $(date -u +%Y-%m-%d)"
          git push origin HEAD:main
