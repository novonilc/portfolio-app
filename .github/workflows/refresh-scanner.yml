name: Refresh Stock Scanner Data

on:
  schedule:
    - cron: '0 13 * * *'   # 6:00 AM Vancouver PDT (UTC-7) / 5:00 AM PST (UTC-8) in winter
  workflow_dispatch:         # Allow manual trigger from GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Use Node.js 24 runner for all actions

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history — required for git rebase to work

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest main before scan
        run: git pull origin main
        # Syncs to HEAD before the script runs so the push is a clean fast-forward.
        # This is the primary fix — eliminates rejections caused by commits that
        # landed on main between checkout and push.

      - name: Fetch S&P 500 list + live fundamentals from Yahoo Finance
        run: node scripts/refresh-scanner.mjs

      - name: Commit and push updated data
        run: |
          git add src/data/stockUniverse.json
          if git diff --staged --quiet; then
            echo "No changes to commit — data unchanged."
            exit 0
          fi
          git commit -m "chore: refresh scanner fundamentals $(date -u +%Y-%m-%d)"
          # Primary push — succeeds in the vast majority of runs
          # Fallback: if a commit landed in the ~3 min the scan was running,
          # rebase our single data commit on top and retry once.
          git push origin main || (
            echo "Push rejected — rebasing on latest main and retrying..."
            git pull --rebase origin main &&
            git push origin main
          )
