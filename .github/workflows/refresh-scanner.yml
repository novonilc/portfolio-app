name: Refresh Stock Scanner Data

on:
  schedule:
    - cron: '0 13 * * *'   # 6:00 AM Vancouver PDT (UTC-7) / 5:00 AM PST (UTC-8) in winter
  workflow_dispatch:         # Allow manual trigger from GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Use Node.js 24 runner for all actions

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15      # S&P 500 scan takes ~3 min; 15 min is a safe cap
    permissions:
      contents: write        # Required to commit and push updated JSON

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch S&P 500 list + live fundamentals from Yahoo Finance
        run: node scripts/refresh-scanner.mjs
        # Fetches ~521 stocks (S&P 500 + top Canadian) via Yahoo Finance.
        # Auto-discovers new S&P 500 additions. Preserves curated moat data.

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/stockUniverse.json
          if git diff --staged --quiet; then
            echo "No changes to commit — data unchanged."
          else
            git commit -m "chore: refresh scanner fundamentals $(date -u +%Y-%m-%d)"
            git push
          fi
