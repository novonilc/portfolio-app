<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" width="560" height="120">
  <defs>
    <linearGradient id="hbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#060b18"/>
    </linearGradient>
    <linearGradient id="hg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="hg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Icon box -->
  <rect x="0" y="10" width="100" height="100" rx="22" fill="url(#hbg)"/>

  <!-- Bars inside icon -->
  <rect x="14"  y="72" width="14" height="28" rx="3" fill="url(#hg1)" opacity="0.5"/>
  <rect x="32"  y="59" width="14" height="41" rx="3" fill="url(#hg1)" opacity="0.7"/>
  <rect x="50"  y="45" width="14" height="55" rx="3" fill="url(#hg1)"/>
  <rect x="68"  y="31" width="14" height="69" rx="3" fill="url(#hg2)"/>

  <!-- Trend line inside icon -->
  <polyline points="21,68 39,55 57,41 75,27"
    stroke="#fbbf24" stroke-width="2.5" fill="none"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- Brand dot -->
  <circle cx="14" cy="20" r="5" fill="#fbbf24"/>

  <!-- Text -->
  <text x="118" y="52"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800" font-size="30" letter-spacing="-0.8"
    fill="#f1f5f9">Portfolio Rebalancer</text>

  <!-- PRO pill -->
  <rect x="118" y="64" width="58" height="26" rx="13" fill="#fbbf24"/>
  <text x="147" y="82"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900" font-size="13" letter-spacing="2"
    fill="#0a1628">PRO</text>

  <!-- Tagline -->
  <text x="186" y="82"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="500" font-size="14" letter-spacing="0.2"
    fill="#475569">  ·  For Canadian Investors</text>
</svg>
